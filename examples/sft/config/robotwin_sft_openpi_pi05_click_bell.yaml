defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-3

runner:
  task_type: sft
  logger:
    log_path: "${oc.env:REPO_PATH}/logs/sft_pi05_click_bell"
    project_name: "rlinf_pi05_robotwin"
    experiment_name: "click_bell_headcam"
    logger_backends: ["wandb", "tensorboard"]

  max_epochs: 20000
  max_steps: -1
  val_check_interval: -1
  save_interval: 1000

data:
  train_data_paths: "/ML-vePFS/protected/tangyinzhou/RLinf/datasets/lerobot"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 40
  global_batch_size: 160
  seed: 0

  model:
    precision: null
    model_path: "/ML-vePFS/protected/tangyinzhou/RLinf/pi05_base"
    num_action_chunks: 50
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi05_aloha_robotwin_head"
      detach_critic_input: True
      num_images_in_input: 1
      train_expert_only: False

  openpi_data:
    repo_id: "rlinf/robotwin_headcam_click_bell"

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 30000
    lr_warmup_steps: 1000
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
