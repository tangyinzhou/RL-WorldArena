defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-1

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "pi05_headcam_adjust_bottle"
    logger_backends: ["tensorboard"]

  max_epochs: 20000
  max_steps: -1
  val_check_interval: -1
  save_interval: 5000

data:
  # HF_LEROBOT_HOME -- the converter wrote
  #   ${data.train_data_paths}/${actor.openpi_data.repo_id}
  train_data_paths: "/ML-vePFS/protected/tangyinzhou/RLinf/datasets/lerobot"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 64
  seed: 0

  model:
    precision: null
    model_path: "/path/to/pi05-model"
    num_action_chunks: 50
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi05_aloha_robotwin_head"
      detach_critic_input: True
      num_images_in_input: 1
      train_expert_only: False

  # Override the repo_id baked into pi05_aloha_robotwin so the loader
  # reads our locally-converted dataset instead of the HF hub one.
  openpi_data:
    repo_id: "rlinf/robotwin_headcam_adjust_bottle"

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 30000
    lr_warmup_steps: 1000
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
