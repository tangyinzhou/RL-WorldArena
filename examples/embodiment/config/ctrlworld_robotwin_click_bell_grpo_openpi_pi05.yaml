defaults:
  - env/ctrlworld_robotwin_click_bell@env.train
  - env/ctrlworld_robotwin_click_bell@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 1   # single GPU; adjust for multi-card runs

runner:
  task_type: embodied
  logger:
    log_path: "../logs"
    project_name: rlinf
    experiment_name: "ctrlworld_robotwin_click_bell_grpo_openpi_pi05"
    logger_backends: ["tensorboard"]   # add "wandb" or "swanlab" as needed

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1   # set to positive to enable periodic eval
  save_interval: 3

  resume_dir: null   # path to checkpoints/global_step_N to resume
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 4              # GRPO group size; total_num_envs must be a multiple of this
  rollout_epoch: 8
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 5.0

  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: True
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5

env:
  group_name: "EnvGroup"

  train:
    # total_num_envs must satisfy:
    #   total_num_envs % group_size == 0
    total_num_envs: 4
    group_size: ${algorithm.group_size}
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    # ⚠️ chunk=5 (Ctrl-World num_frames), NOT 8 like Wan/OpenSora.
    # Must match actor.model.num_action_chunks and actor.model.openpi.action_chunk.
    chunk: 5
    action_dim: 14
    enable_offload: False
    # Speed up rollouts during training: reduce inference steps (at cost of quality)
    num_inference_steps: 10
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    total_num_envs: 4
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    reward_coef: ${algorithm.reward_coef}
    group_size: 1
    use_fixed_reset_state_ids: False
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 320    # must divide rollout_size (1280); options: 640, 320, 256, 160, 128, 80, 64, 40, 32, 20, 16
  seed: 1234
  enable_offload: False

  model:
    # Path to the pre-trained Pi0.5 policy checkpoint (SFT on click_bell head-cam)
    model_path: "/manifold-obs/tangyinzhou/RLinf/logs/pi05-clickbell/pi05-clickbell/sft_openpi_click_bell_headcam/checkpoints/global_step_4000/actor"
    # ⚠️ num_action_chunks MUST equal env.train.chunk = 5 (Ctrl-World chunk)
    num_action_chunks: 5
    action_dim: 14
    add_value_head: False   # set True and loss_type: actor_critic for PPO
    num_steps: 5
    openpi:
      config_name: "pi05_aloha_robotwin_head"
      num_images_in_input: 1
      noise_level: 0.3
      detach_critic_input: True
      # ⚠️ action_chunk MUST equal num_action_chunks = 5
      action_chunk: 5
      action_env_dim: 14

  optim:
    lr: 2.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

# Reward model lives inside CtrlWorldEnv (EnvWorker); not used at runner level.
reward:
  use_reward_model: False

critic:
  use_critic_model: False
