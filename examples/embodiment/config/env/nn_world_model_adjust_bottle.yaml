env_type: nn_world_model
total_num_envs: null

auto_reset: False
ignore_terminations: False

reward_coef: 1.0
use_rel_reward: False
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 100
max_episode_steps: 100

is_eval: False

# Neural world model specific configs
model_path: null   # Path to trained world model checkpoint. null = random weights (debug)
image_size: [224, 224]  # [H, W] for observations
state_dim: 14
action_dim: 14
num_wrist_cameras: 0  # Number of wrist cameras (0 = disabled, for OpenPI compatibility set to 2)
task_description: "adjust bottle"

video_cfg:
  save_video: False
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False
