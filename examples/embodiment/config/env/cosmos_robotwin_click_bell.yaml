env_type: cosmos_wm
task_suite_name: robotwin_click_bell
wm_env_type: robotwin

total_num_envs: null

auto_reset: False
ignore_terminations: False
max_steps_per_rollout_epoch: 240
max_episode_steps: 240

use_rel_reward: True
reward_coef: 5.0

seed: 0
group_size: 1
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: False
specific_reset_id: null

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False
success_reward_threshold: 0.9
inference_backend: rpc
rpc_timeout_s: 120.0
rpc:
  url: http://127.0.0.1:18080
  timeout_s: 120.0
  dataset_size_fallback: 10000

# ===== Cosmos world model =====
chunk: 12
condition_frame_length: 1
num_frames: 13
image_size: [256, 256]
action_dim: 14

# ---- Path settings (aligned with wan style: root path + derived fields) ----
# Optional: Cosmos source root. If null, CosmosEnv defaults to <repo>/cosmos-predict2.5.
cosmos_root: /ML-vePFS/protected/tangyinzhou/RLinf/cosmos-predict2.5
# Root of click_bell dataset in cosmos-predict2.5.
cosmos_wm_dataset_root: /ML-vePFS/protected/tangyinzhou/RLinf/cosmos-predict2.5/datasets/vla_robotwin_4k_320/click_bell
# Cosmos model checkpoint (from infer_vla_click_bell.py DEFAULT_CKPT).
cosmos_wm_ckpt_path: /ML-vePFS/protected/tangyinzhou/tmp/imaginaire4-output/cosmos_predict2_action_conditioned/vla_robotwin/vla_click_bell_/checkpoints/iter_000002000

# Dataset_3D parameters
train_annotation_path: ${env.train.cosmos_wm_dataset_root}/annotation/train
val_annotation_path: ${env.train.cosmos_wm_dataset_root}/annotation/val
test_annotation_path: ${env.train.cosmos_wm_dataset_root}/annotation/val
video_base_path: ${env.train.cosmos_wm_dataset_root}
stat_path: ${env.train.cosmos_wm_dataset_root}/stat.json

data_mode: val
fps_downsample_ratio: 1
num_action_per_chunk: ${env.train.chunk}
cam_ids: [0]
accumulate_action: False
video_size: [240, 320]
val_start_frame_interval: 1
control_mode: joint
gripper_dim: 2
action_scaler: [20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0, 20.0]
action_mode: absolute
action_norm_type: stat
gripper_rescale_factor: 1.0
state_key: state
gripper_key: null

world_model:
  experiment: vla_click_bell_action_conditioned_rectified_flow_2b_240x320
  ckpt_path: ${env.train.cosmos_wm_ckpt_path}
  config_file: cosmos_predict2/_src/predict2/action/configs/action_conditioned/config.py
  guidance: 0.0
  num_steps: 35
  num_conditional_frames: 1
  load_ema_to_reg: True

reward_model:
  type: RoboTwinT5CrossAttn
  from_pretrained: /manifold-obs/tangyinzhou/RLinf/diffsynth-studio/RLinf-Wan-RobotWin-ClickBell/resnet_rm.pth
  t5_model_name: /ML-vePFS/protected/tangyinzhou/RLinf/pretrained_models/t5-base
