env_type: genie_wm
total_num_envs: null

auto_reset: False
ignore_terminations: False

reward_coef: 1.0
use_rel_reward: False
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 100
max_episode_steps: 100

is_eval: False

# Data path: val10-format dataset root directory
# Layout: <val10_root>/<task_name>/aloha-agilex_clean_50/aloha-agilex_clean_50/{video,actions,states,instructions}/
val10_root: "/manifold-obs/benchmark/robotwin2.0_clean50_val_10"
# Optional: restrict to specific tasks (null = all tasks)
task_filter: ["adjust_bottle"]
# task_filter: null

# Genie world model checkpoints
tokenizer_ckpt: "/ML-vePFS/protected/tangyinzhou/roboscape/roboscape/genie/magvit2.ckpt"
genie_config: "/ML-vePFS/protected/tangyinzhou/roboscape/roboscape/genie/genie/configs/magvit_n32_h8_d512.json"
genie_checkpoint: "/manifold-obs/tangyinzhou/worldarena/worldarena_env/step_70000"

# Genie latent grid size (must match model config)
genie_H: 16
genie_W: 16

# Pixel observation size returned to the policy
image_size: [256, 256]

# Action / state dimensions
state_dim: 14
action_dim: 14
task_description: "adjust bottle"

# Wrist cameras (0 = disabled; set to 2 for OpenPI 3-image input)
num_wrist_cameras: 2

# Generation parameters (mirrors rollout_policy_genie_closedloop.py defaults)
resize: 256            # Resize frame before VQModel encode
num_prompt_frames: 1   # Number of prompt frames fed to Genie
maskgit_steps: 2       # MaskGIT sampling iterations per frame
temperature: 0.0       # Sampling temperature (0.0 = greedy)

# Reward model configuration (mirrors WanEnv)
# Set enabled: False to disable reward model (rewards will be zero)
# Supported types: ResnetRewModel, TaskEmbedResnetRewModel, robotwin_t5_crossattn
reward_model:
  enabled: True
  type: robotwin_t5_crossattn
  # from_pretrained is used as model_path for checkpoint loading
  from_pretrained: "logs/robotwin_reward_model_adjust_bottle/robotwin_reward_training/checkpoints/best_model/actor/model_state_dict/full_weights.pt"
  reward_threshold: 0.6       # sigmoid prob threshold for termination detection

  # RoboTwinT5CrossAttnRewardModel hyper-parameters
  t5_model_name: "t5-base"    # override to local path in debug script for offline use
  freeze_t5: true
  max_text_length: 64
  num_attn_heads: 8
  attn_dropout: 0.0
  hidden_dim: 256
  head_dropout: 0.1
  image_size: [3, 224, 224]
  normalize: true

video_cfg:
  save_video: False
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False
