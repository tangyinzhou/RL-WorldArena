# GENIE world-model environment config for RobotWin click_bell task.
# Pairs with: genie_robotwin_click_bell_grpo_openpi_pi05.yaml
#
# GENIE pipeline:
#   encode : roboscape/genie/encode_vla_robotwin.sh  -> video.bin + action.bin (raw values)
#   train  : roboscape/genie/train_action.sh         -> STMaskGIT checkpoint
#   infer  : GenieEnv (this file)                    -> online RL rollout

env_type: genie_wm
wm_env_type: robotwin
task_suite_name: click_bell

total_num_envs: null   # overridden in training config

auto_reset: False
ignore_terminations: False

use_rel_reward: True
reward_coef: 1.0

seed: 0
group_size: 1
use_fixed_reset_state_ids: True

is_eval: False

max_episode_steps: 200
max_steps_per_rollout_epoch: 200

success_reward_threshold: 0.9

# ──────────────────────────────────────────────────────────────────────
# GENIE generation parameters
# ──────────────────────────────────────────────────────────────────────
# chunk must match actor.num_action_chunks and actor.openpi.action_chunk
chunk: 8
# num_prompt_frames = number of history frames held in image_queue
num_prompt_frames: 8
# window_size = num_prompt_frames + chunk  (must be consistent)
window_size: 16         # 8 + 8

image_size: [256, 256]

# Action / state dimension for RobotWin (14-DoF absolute control)
action_dim: 14

# Spatial token grid side length output by MagViT2
latent_side_len: 16

# ──────────────────────────────────────────────────────────────────────
# Model checkpoints  (fill in actual paths before launching)
# ──────────────────────────────────────────────────────────────────────

# RoboTwin token dataset produced by encode_vla_robotwin.sh
# Expected layout:
#   <initial_image_path>/train/{video.bin, action.bin, segment_ids_total.bin, metadata.json}
#   <initial_image_path>/val/{...}
initial_image_path: /ML-vePFS/protected/tangyinzhou/RLinf/roboscape/encoded_vla_robotwin/click_bell

# STMaskGIT world-model checkpoint directory (HuggingFace-style, from train_action.sh)
# Must point to a step_N subdirectory that contains config.json + model.safetensors
genie_ckpt_path: /manifold-obs/tangyinzhou/worldarena/worldarena_env_click_bell/step_265000

# GenieConfig JSON (controls T, S, action_dim, etc.)
genie_config_path: /ML-vePFS/protected/tangyinzhou/RLinf/roboscape/genie/genie/configs/magvit_n32_h8_d512.json

# MagViT2 VQModel checkpoint (.ckpt file)
magvit2_ckpt_path: /ML-vePFS/protected/tangyinzhou/RLinf/roboscape/genie/magvit2.ckpt

# Action normalisation statistics (optional).
# Only set if encode_vla_robotwin.sh was run with --stat_file.
# When unset (null), raw action values are used (current default).
# action_stat_file: null

# ──────────────────────────────────────────────────────────────────────
# Debug: print per-chunk reward breakdown (raw reward model output + diff reward)
print_chunk_rewards: False

# ──────────────────────────────────────────────────────────────────────
# Reward model
# ──────────────────────────────────────────────────────────────────────
reward_model:
  type: RoboTwinT5CrossAttn
  from_pretrained: /manifold-obs/tangyinzhou/RLinf/diffsynth-studio/RLinf-Wan-RobotWin-ClickBell/resnet_rm.pth
  t5_model_name: /ML-vePFS/protected/tangyinzhou/RLinf/pretrained_models/t5-base

# ──────────────────────────────────────────────────────────────────────
# Video logging
# ──────────────────────────────────────────────────────────────────────
video_cfg:
  save_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False
