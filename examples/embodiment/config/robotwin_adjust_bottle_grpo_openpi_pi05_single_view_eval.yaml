defaults:
  - env/robotwin_adjust_bottle@env.train
  - env/robotwin_adjust_bottle@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor, env, rollout: 0-3

runner:
  task_type: embodied
  logger:
    log_path: "${oc.env:REPO_PATH}/logs/eval_pi05_adjust_bottle_grpo_single_view"
    project_name: "rlinf_pi05_robotwin"
    experiment_name: "adjust_bottle_headcam_grpo_eval"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: 10
  save_interval: 10

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  reward_coef: 5.0

  rollout_epoch: 8
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 2
  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.05
  entropy_bonus: 0.05
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 1.0
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5

  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: -1
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: True

  train:
    total_num_envs: 64
    reward_coef: ${algorithm.reward_coef}
    use_custom_reward: False
    use_rel_reward: True
    max_episode_steps: 600
    max_steps_per_rollout_epoch: 600
    group_size: ${algorithm.group_size}
    assets_path: "/ML-vePFS/protected/tangyinzhou/RLinf/RoboTwin"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    center_crop: False
    task_config:
      embodiment: [aloha-agilex]
      camera:
        collect_head_camera: true
        collect_wrist_camera: false
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0

  eval:
    total_num_envs: 512
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 600
    reward_coef: ${algorithm.reward_coef}
    use_custom_reward: False
    use_rel_reward: True
    max_steps_per_rollout_epoch: 600
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: "/ML-vePFS/protected/tangyinzhou/RLinf/RoboTwin"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    center_crop: False
    task_config:
      embodiment: [aloha-agilex]
      camera:
        collect_head_camera: true
        collect_wrist_camera: false
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: True
  pipeline_stage_num: 1
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 1024
  seed: 1234
  enable_offload: True

  model:
    # Replace with your GRPO checkpoint path before evaluation.
    # model_path: "/manifold-obs/tangyinzhou/RLinf/logs/20260429-06:21:27/sft_openpi_adjust_bottle_headcam/checkpoints/global_step_1000/actor"
    # model_path: "/manifold-obs/tangyinzhou/RLinf/logs/20260429-12:56:30/sft_openpi_click_bell_headcam/checkpoints/global_step_1000/actor"
    model_path: "/ML-vePFS/protected/tangyinzhou/RLinf/pi05_jx"
    num_action_chunks: 50
    action_dim: 14
    add_value_head: False
    num_steps: 5
    openpi:
      config_name: "pi05_aloha_robotwin_head_adjust_bottle"
      num_images_in_input: 1
      noise_level: 0.3
      detach_critic_input: True

  optim:
    lr: 5.0e-06
    value_lr: 1.0e-04
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
